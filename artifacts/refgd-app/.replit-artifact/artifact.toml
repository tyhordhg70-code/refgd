kind = "web"
previewPath = "/"
title = "RefundGod"
version = "1.0.0"
id = "artifacts/refgd-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18827

[services.development]
run = "cd ../../refgd && PORT=18827 HOSTNAME=0.0.0.0 pnpm dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/refgd-app", "run", "build" ]
publicDir = "artifacts/refgd-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18827"
BASE_PATH = "/"
